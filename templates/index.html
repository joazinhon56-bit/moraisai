<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morais AI - Chat</title>

    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#007bff">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Estilos de Base e Layout */
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Barra Lateral (Histórico) */
        #sidebar { width: 260px; background-color: #111; border-right: 1px solid #2d2d2d; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 20px; }
        .btn-new-chat { width: 100%; background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 14px; transition: 0.2s; }
        .btn-new-chat:hover { background: #2d2d2d; }
        
        #history-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .history-item { padding: 10px; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; transition: 0.2s; }
        .history-item:hover { background: #222; color: white; }
        .history-item.active { background: #007bff33; color: #007bff; border: 1px solid #007bff55; }

        /* Área Principal */
        #main-wrapper { flex: 1; display: flex; flex-direction: column; background-color: #0f0f0f; position: relative; }
        
        /* Ajuste do Login para incluir Password */
        #login-container { position: absolute; inset: 0; background: #0a0a0a; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-box { background-color: #161616; padding: 40px; border-radius: 20px; border: 1px solid #2d2d2d; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .auth-input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px; }
        .auth-input:focus { border-color: #007bff; }

        /* Chat e Inputs */
        .top-bar { padding: 15px 25px; border-bottom: 1px solid #2d2d2d; display: flex; justify-content: space-between; align-items: center; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 14px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background-color: #007bff; border-bottom-right-radius: 2px; }
        .ia { align-self: flex-start; background-color: #222; border: 1px solid #333; border-bottom-left-radius: 2px; }

        #input-area-container { padding: 20px; max-width: 800px; margin: 0 auto; width: 90%; }
        .input-box { background: #161616; border: 1px solid #2d2d2d; border-radius: 25px; display: flex; align-items: center; padding: 10px 20px; gap: 10px; }
        #user-input { flex: 1; background: none; border: none; color: white; outline: none; padding: 10px; }
        
        .btn-primary { width: 100%; background: #007bff; color: white; border: none; padding: 14px; border-radius: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-primary:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <button class="btn-new-chat" onclick="novoChat()">+ Novo Chat</button>
        </div>
        <div id="history-list"></div>
    </aside>

    <main id="main-wrapper">
        <div id="login-container">
           <div id="login-container">
        <div class="login-box">
            <h2 id="auth-title">Entrar no Morais AI</h2>
            <p id="auth-subtitle">Bem-vindo de volta, explorador.</p>
            
            <div id="email-field" style="display: none;">
                <input type="email" id="email" class="auth-input" placeholder="Endereço de Email">
            </div>

            <input type="text" id="username" class="auth-input" placeholder="Nome de utilizador">
            <input type="password" id="password" class="auth-input" placeholder="Palavra-passe">
            
            <button class="btn-primary" id="btn-auth-action" onclick="processarAuth()">Entrar</button>
            
            <div style="margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px;">
                <div style="display: flex; align-items: center; width: 100%; color: #444; font-size: 12px;">
                    <hr style="flex: 1; border: 0; border-top: 1px solid #2d2d2d;">
                    <span style="padding: 0 10px;">OU</span>
                    <hr style="flex: 1; border: 0; border-top: 1px solid #2d2d2d;">
                </div>

                <div id="g_id_onload" 
                     data-client_id="314184167979-drqft3ldcshj3vn1730dtt0er1ha9spd.apps.googleusercontent.com" 
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="standard"></div>
            </div>

            <div class="toggle-link" style="margin-top: 25px; font-size: 14px; color: #888;">
                <span id="toggle-question">É novo?</span> 
                <span onclick="alternarModo()" id="toggle-action" style="color: #007bff; cursor: pointer; font-weight: bold; margin-left: 5px;">Crie uma conta</span>
            </div>
        </div>
    </div>

        <div class="top-bar">
            <span id="display-user" style="font-weight: bold; color: #007bff;"></span>
            <button onclick="fazerLogout()" style="background: none; border: none; color: #888; cursor: pointer; font-size: 12px;">Sair</button>
        </div>

        <div id="chat-container"></div>

        <div id="input-area-container">
            <div class="input-box">
                <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="previewImg()">
                <button onclick="document.getElementById('file-input').click()" style="background: none; border: none; cursor: pointer; font-size: 18px;">📷</button>
                <input type="text" id="user-input" placeholder="Pergunta-me qualquer coisa..." onkeypress="if(event.key==='Enter') enviarMensagem()">
                <button onclick="enviarMensagem()" style="background: none; border: none; cursor: pointer; font-size: 18px;">🚀</button>
            </div>
        </div>
    </main>

    <script>
    // Variáveis globais para controlar o estado da app
    let modoRegistro = false; 
    let currentSessionId = null;
    let fotoData = null;

    // Executa assim que a página carrega
    window.onload = () => {
        const user = localStorage.getItem('morais_user');
        if (user) {
            entrarNoSistema(user);
            if (typeof carregarListaSessoes === "function") carregarListaSessoes();
            novoChat();
        }
    };

    // --- ESTA É A FUNÇÃO QUE ESTAVA A FALTAR ---
    function alternarModo() {
        modoRegistro = !modoRegistro;
        
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const emailField = document.getElementById('email-field');
        const btnAction = document.getElementById('btn-auth-action');
        const toggleQuestion = document.getElementById('toggle-question');
        const toggleAction = document.getElementById('toggle-action');

        if (modoRegistro) {
            authTitle.innerText = "Criar Nova Conta";
            authSubtitle.innerText = "Junta-te à revolução da IA.";
            if (emailField) emailField.style.display = "block"; 
            btnAction.innerText = "Registar agora";
            toggleQuestion.innerText = "Já tens conta?";
            toggleAction.innerText = "Faz Login";
        } else {
            authTitle.innerText = "Entrar no Morais AI";
            authSubtitle.innerText = "Bem-vindo de volta, explorador.";
            if (emailField) emailField.style.display = "none"; 
            btnAction.innerText = "Entrar";
            toggleQuestion.innerText = "É novo?";
            toggleAction.innerText = "Crie uma conta";
        }
    }

    // Processa o Login ou Registo manual
    function processarAuth() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const emailInput = document.getElementById('email');
        const email = emailInput ? emailInput.value : "";

        if (user.trim().length < 3) return alert("Insere um nome válido!");
        if (pass.length < 4) return alert("Password deve ter pelo menos 4 caracteres!");
        
        if (modoRegistro && !email.includes("@")) {
            return alert("Por favor, insere um email válido!");
        }

        localStorage.setItem('morais_user', user); [cite: 43]
        entrarNoSistema(user); [cite: 44]
    }

    // Entra na interface de Chat
    function entrarNoSistema(nome) {
        const loginContainer = document.getElementById('login-container');
        const displayUser = document.getElementById('display-user');
        
        if (loginContainer) loginContainer.style.display = 'none'; [cite: 46]
        if (displayUser) displayUser.innerText = "@" + nome; [cite: 47]
    }

    // Login oficial pelo Google
    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        localStorage.setItem('morais_user', payload.name);
        entrarNoSistema(payload.name);
        location.reload(); // Recarrega para ativar o histórico
    }

    function fazerLogout() { 
        localStorage.clear(); [cite: 47]
        location.reload(); [cite: 48]
    }

    // Funções de envio de mensagem (Mantidas do original)
    async function enviarMensagem() {
        const input = document.getElementById('user-input'); [cite: 55]
        const msg = input.value.trim(); [cite: 56]
        if (!msg && !fotoData) return;

        appendMessage(msg, 'user'); [cite: 56]
        input.value = ''; [cite: 56]

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ msg: msg, image: fotoData })
            }); [cite: 57]
            const data = await res.json(); [cite: 58]
            appendMessage(data.resposta, 'ia'); [cite: 58]
            fotoData = null;
        } catch (e) {
            appendMessage("Erro na ligação ao servidor.", 'ia'); [cite: 59]
        }
    }

    function appendMessage(text, type, save = true) {
        const container = document.getElementById('chat-container'); [cite: 51]
        const div = document.createElement('div'); [cite: 52]
        div.className = `message ${type}`; [cite: 52]
        div.innerHTML = text; [cite: 52]
        container.appendChild(div); [cite: 52]
        container.scrollTop = container.scrollHeight; [cite: 52]
    }

    function novoChat() {
        document.getElementById('chat-container').innerHTML = '';
        appendMessage("Olá! Sou o **Morais AI**. Como posso ajudar-te hoje?", 'ia', false);
    }
</script>
    </script>
</body>
</html>
