<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morais AI - Oficial</title>
    <style>
        /* CSS: DESIGN E CORES */
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .auth-card { background-color: #161616; padding: 40px; border-radius: 24px; border: 1px solid #2d2d2d; text-align: center; width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); display: none; }
        #main-container { display: none; flex-direction: column; width: 100%; height: 100vh; background-color: #0f0f0f; }

        h2 { margin-bottom: 8px; font-size: 26px; font-weight: 700; color: #fff; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }

        /* Inputs */
        .input-group { text-align: left; margin-bottom: 15px; }
        input.auth-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #1f1f1f; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input.auth-input:focus { border-color: #007bff; }

        /* Botões */
        .btn-primary { width: 100%; background-color: #007bff; color: white; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; margin-top: 10px; font-size: 16px; }
        .btn-google { width: 100%; background-color: white; color: #000; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 14px; }
        .btn-google img { width: 18px; }

        .divider { margin: 25px 0; display: flex; align-items: center; color: #444; font-size: 12px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #333; margin: 0 10px; }

        .toggle-text { margin-top: 25px; font-size: 14px; color: #888; }
        .toggle-text span { color: #007bff; cursor: pointer; font-weight: 600; text-decoration: underline; }

        /* Interface do Chat */
        .top-bar { padding: 15px 25px; background: #161616; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d2d2d; }
        #chat-container { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; 
    padding: 15px 20px; 
    border-radius: 22px; 
    font-size: 15px; 
    line-height: 1.6; 
    margin-bottom: 5px; }
        .user { align-self: flex-end; 
    background-color: #2e3034; 
    color: white; 
    border-bottom-right-radius: 4px; }
        .ia { align-self: flex-start; 
    background: #1e1f20; 
    color: #efefef; 
    border: 1px solid #3d3d3d; 
    border-bottom-left-radius: 4px; }
        
        #input-area { margin: 0 20px 20px 20px;
    background-color: #1e1f20; 
    border-radius: 28px; 
    padding: 10px 20px;
    border: 1px solid #3d3d3d;
    display: flex;
    align-items: center;
    gap: 10px; }
        .chat-img-render { max-width: 100%; border-radius: 12px; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div id="login-card" class="auth-card" style="display: block;">
    <h2>Entrar</h2>
    <p>Acede à tua conta Morais AI</p>
    <input type="text" id="login-id" class="auth-input" placeholder="Username ou Email">
    <input type="password" id="login-pass" class="auth-input" placeholder="Password">
    <button class="btn-primary" onclick="processarLogin()">Entrar</button>
    
    <div class="divider">OU</div>
    
    <button class="btn-google" onclick="loginGoogle()">
        <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" width="18"> Entrar com Google
    </button>
    <div class="toggle-text">És novo? <span onclick="irParaRegisto()">Cria uma conta</span></div>
</div>

<div id="register-card" class="auth-card" style="display: none;">
    <h2>Criar Conta</h2>
    <p>Regista-te para começar a usar a IA</p>
    
    <button class="btn-google" onclick="loginGoogle()">
        <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" width="18"> Criar com Google
    </button>
    
    <div class="divider">OU USA O TEU EMAIL</div>
    
    <input type="email" id="reg-email" class="auth-input" placeholder="O teu Gmail">
    <input type="text" id="reg-user" class="auth-input" placeholder="Escolhe um Username">
    <input type="password" id="reg-pass" class="auth-input" placeholder="Cria uma Password">
    <button class="btn-primary" onclick="processarRegisto()">Criar Minha Conta</button>
    
    <div class="toggle-text">Já tens conta? <span onclick="irParaLogin()">Fazer Login</span></div>
</div>

    <div id="register-card" class="auth-card">
        <h2>Criar Conta</h2>
        <p>Regista-te para começar a usar a IA</p>
        <button class="btn-google" onclick="loginGoogle()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg"> Criar conta com Google
        </button>
        <div class="divider">OU PREENCHA OS DADOS</div>
        <input type="email" id="reg-email" class="auth-input" placeholder="O teu Email">
        <input type="text" id="reg-user" class="auth-input" placeholder="Escolhe um Username">
        <input type="password" id="reg-pass" class="auth-input" placeholder="Cria uma Password">
        <button class="btn-primary" onclick="processarRegisto()">Criar Minha Conta</button>
        <div class="toggle-text">Já tens conta? <span onclick="irParaLogin()">Fazer Login</span></div>
    </div>

    <div id="main-container">
        <div class="top-bar">
            <span id="user-tag" style="font-weight: 700; color: #007bff;"></span>
            <div>
                <button onclick="novoChat()" style="background:#333; border:none; color:white; padding:8px 15px; border-radius:10px; cursor:pointer; margin-right:5px;">+ Novo Chat</button>
                <button onclick="fazerLogout()" style="background:#c82333; border:none; color:white; padding:8px 15px; border-radius:10px; cursor:pointer;">Sair</button>
            </div>
        </div>
        <div id="chat-container"></div>
        <div id="input-area">
            <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="previewImagem()">
            <button onclick="document.getElementById('file-input').click()" style="background:none; border:none; cursor:pointer; font-size:24px;">📷</button>
            <input type="text" id="user-input" style="flex:1; padding:15px; border-radius:15px; border:1px solid #333; background:#222; color:white;" placeholder="Pergunta algo ou pede uma imagem..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:#007bff; border:none; color:white; padding:15px 25px; border-radius:15px; cursor:pointer; font-weight:bold;">Enviar</button>
        </div>
    </div>

    <script>
        // 1. FUNÇÕES DE NAVEGAÇÃO (Trocar ecrãs)
function irParaRegisto() {
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('register-card').style.display = 'block';
}

function irParaLogin() {
    document.getElementById('register-card').style.display = 'none';
    document.getElementById('login-card').style.display = 'block';
}

// 2. LÓGICA DE SESSÃO (Verifica se já estás logado ao abrir)
window.onload = () => {
    const user = localStorage.getItem('morais_user');
    if (user) entrarNoSistema(user);
};

function entrarNoSistema(nome) {
    // Esconde todos os ecrãs de login/registo e mostra o chat
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('register-card').style.display = 'none';
    document.getElementById('main-container').style.display = 'flex';
    document.getElementById('user-tag').innerText = "@" + nome;
    carregarHistorico();
}

// 3. PROCESSAR LOGIN E REGISTO
function processarLogin() {
    const id = document.getElementById('login-id').value;
    if(id) { 
        localStorage.setItem('morais_user', id); 
        entrarNoSistema(id); 
    }
}

function processarRegisto() {
    const email = document.getElementById('reg-email').value;
    const user = document.getElementById('reg-user').value;
    const pass = document.getElementById('reg-pass').value;

    // Validação simples: tem de ter @ no email e um username
    if(email.includes('@') && user.length >= 3) {
        localStorage.setItem('morais_user', user);
        entrarNoSistema(user);
    } else {
        alert("Dados inválidos! Garante que o Gmail tem '@' e o Username tem pelo menos 3 letras.");
    }
}

// 4. HISTÓRICO (Para não perder as conversas)
function carregarHistorico() {
    const hist = JSON.parse(localStorage.getItem('morais_hist')) || [];
    const container = document.getElementById('chat-container');
    container.innerHTML = ''; 
    if (hist.length === 0) {
        appendMessage("Olá! Sou o Morais AI. Como posso ajudar-te hoje?", 'ia', false);
    } else {
        hist.forEach(m => appendMessage(m.text, m.type, false));
    }
}

function guardarNoHistorico(text, type) {
    const hist = JSON.parse(localStorage.getItem('morais_hist')) || [];
    hist.push({ text, type });
    localStorage.setItem('morais_hist', JSON.stringify(hist));
}
        let fotoData = null;

        // --- NAVEGAÇÃO ---
        function irParaRegisto() { document.getElementById('login-card').style.display = 'none'; document.getElementById('register-card').style.display = 'block'; }
        function irParaLogin() { document.getElementById('register-card').style.display = 'none'; document.getElementById('login-card').style.display = 'block'; }

        // --- LÓGICA DE LOGIN/SESSÃO ---
        window.onload = () => {
            const user = localStorage.getItem('morais_user');
            if (user) entrar(user);
        };


        function processarLogin() {
            const id = document.getElementById('login-id').value;
            if(id) { localStorage.setItem('morais_user', id); entrar(id); }
        }

        function processarRegisto() {
            const email = document.getElementById('reg-email').value;
            const user = document.getElementById('reg-user').value;
            if(email.includes('@') && user) { localStorage.setItem('morais_user', user); entrar(user); }
            else { alert("Dados inválidos!"); }
        }

        function loginGoogle() { const u = "Explorador_Google"; localStorage.setItem('morais_user', u); entrar(u); }
        function fazerLogout() { localStorage.removeItem('morais_user'); location.reload(); }

        

        function appendMessage(text, type, save = true) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            if (save) {
                const hist = JSON.parse(localStorage.getItem('morais_hist')) || [];
                hist.push({ text, type });
                localStorage.setItem('morais_hist', JSON.stringify(hist));
            }
        }

        function novoChat() { localStorage.removeItem('morais_hist'); carregarHistorico(); }

        function previewImagem() {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onload = (e) => { 
                fotoData = e.target.result; 
                appendMessage("<i>[Imagem carregada para análise]</i>", 'user'); 
            };
            reader.readAsDataURL(file);
        }

        async function enviar() {
            const input = document.getElementById('user-input');
            const msg = input.value;
            if(!msg && !fotoData) return;
            if(msg) appendMessage(msg, 'user');
            input.value = "";
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg: msg, image: fotoData })
                });
                const data = await res.json();
                appendMessage(data.resposta, 'ia');
                fotoData = null;
            } catch(e) { appendMessage("Erro de ligação.", 'ia'); }
        }
    </script>
</body>
</html>
