<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morais AI - Chat</title>

    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#007bff">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Estilos de Base e Layout */
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Barra Lateral (Histórico) */
        #sidebar { width: 260px; background-color: #111; border-right: 1px solid #2d2d2d; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 20px; }
        .btn-new-chat { width: 100%; background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 14px; transition: 0.2s; }
        .btn-new-chat:hover { background: #2d2d2d; }
        
        #history-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .history-item { padding: 10px; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; transition: 0.2s; }
        .history-item:hover { background: #222; color: white; }
        .history-item.active { background: #007bff33; color: #007bff; border: 1px solid #007bff55; }

        /* Área Principal */
        #main-wrapper { flex: 1; display: flex; flex-direction: column; background-color: #0f0f0f; position: relative; }
        
        /* Ajuste do Login para incluir Password */
        #login-container { position: absolute; inset: 0; background: #0a0a0a; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-box { background-color: #161616; padding: 40px; border-radius: 20px; border: 1px solid #2d2d2d; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .auth-input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px; }
        .auth-input:focus { border-color: #007bff; }

        /* Chat e Inputs */
        .top-bar { padding: 15px 25px; border-bottom: 1px solid #2d2d2d; display: flex; justify-content: space-between; align-items: center; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 14px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background-color: #007bff; border-bottom-right-radius: 2px; }
        .ia { align-self: flex-start; background-color: #222; border: 1px solid #333; border-bottom-left-radius: 2px; }

        #input-area-container { padding: 20px; max-width: 800px; margin: 0 auto; width: 90%; }
        .input-box { background: #161616; border: 1px solid #2d2d2d; border-radius: 25px; display: flex; align-items: center; padding: 10px 20px; gap: 10px; }
        #user-input { flex: 1; background: none; border: none; color: white; outline: none; padding: 10px; }
        
        .btn-primary { width: 100%; background: #007bff; color: white; border: none; padding: 14px; border-radius: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-primary:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <button class="btn-new-chat" onclick="novoChat()">+ Novo Chat</button>
        </div>
        <div id="history-list"></div>
    </aside>

    <main id="main-wrapper">
        <div id="login-container">
            <div class="login-box">
                <h2>Morais AI</h2>
                <p>Explora o futuro da inteligência.</p>
                
                <input type="text" id="username" class="auth-input" placeholder="Nome de utilizador">
                <input type="password" id="password" class="auth-input" placeholder="Palavra-passe">
                
                <button class="btn-primary" onclick="processarAuth()">Entrar</button>
                
                <div style="margin-top: 20px; display: flex; justify-content: center;">
                    <div id="g_id_onload" 
                         data-client_id="314184167979-drqft3ldcshj3vn1730dtt0er1ha9spd.apps.googleusercontent.com" 
                         data-callback="handleCredentialResponse">
                    </div>
                    <div class="g_id_signin" data-type="standard"></div>
                </div>
            </div>
        </div>

        <div class="top-bar">
            <span id="display-user" style="font-weight: bold; color: #007bff;"></span>
            <button onclick="fazerLogout()" style="background: none; border: none; color: #888; cursor: pointer; font-size: 12px;">Sair</button>
        </div>

        <div id="chat-container"></div>

        <div id="input-area-container">
            <div class="input-box">
                <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="previewImg()">
                <button onclick="document.getElementById('file-input').click()" style="background: none; border: none; cursor: pointer; font-size: 18px;">📷</button>
                <input type="text" id="user-input" placeholder="Pergunta-me qualquer coisa..." onkeypress="if(event.key==='Enter') enviarMensagem()">
                <button onclick="enviarMensagem()" style="background: none; border: none; cursor: pointer; font-size: 18px;">🚀</button>
            </div>
        </div>
    </main>

    <script>
        let currentSessionId = null;
        let fotoData = null;

        window.onload = () => {
            const user = localStorage.getItem('morais_user');
            if (user) {
                entrarNoSistema(user);
                carregarListaSessoes();
                novoChat();
            }
        };

        function processarAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user.trim().length < 3) return alert("Insere um nome válido!");
            if (pass.length < 4) return alert("A palavra-passe deve ter pelo menos 4 caracteres!");

            localStorage.setItem('morais_user', user);
            entrarNoSistema(user);
            carregarListaSessoes();
            novoChat();
        }

        function entrarNoSistema(nome) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('display-user').innerText = "@" + nome;
        }

        // --- Lógica de Sessões e Chat (Mantida) ---
        function carregarListaSessoes() {
            const historyList = document.getElementById('history-list');
            const sessions = JSON.parse(localStorage.getItem('morais_sessions')) || [];
            historyList.innerHTML = '';
            sessions.slice().reverse().forEach(session => {
                const div = document.createElement('div');
                div.className = `history-item ${session.id === currentSessionId ? 'active' : ''}`;
                div.innerText = session.title || "Conversa sem título";
                div.onclick = () => abrirSessao(session.id);
                historyList.appendChild(div);
            });
        }

        function novoChat() {
            currentSessionId = Date.now().toString();
            document.getElementById('chat-container').innerHTML = '';
            appendMessage("Olá! Sou o **Morais AI**. Como posso ajudar-te hoje?", 'ia', false);
            carregarListaSessoes();
        }

        function salvarMensagemNaSessao(text, type) {
            let sessions = JSON.parse(localStorage.getItem('morais_sessions')) || [];
            let session = sessions.find(s => s.id === currentSessionId);
            if (!session) {
                session = { id: currentSessionId, title: text.substring(0, 30) + "...", messages: [] };
                sessions.push(session);
            }
            session.messages.push({ text, type });
            localStorage.setItem('morais_sessions', JSON.stringify(sessions));
            carregarListaSessoes();
        }

        function appendMessage(text, type, save = true) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            if (save) salvarMensagemNaSessao(text, type);
        }

        async function enviarMensagem() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg && !fotoData) return;
            if (msg) appendMessage(msg, 'user');
            input.value = '';
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg: msg, image: fotoData })
                });
                const data = await res.json();
                appendMessage(data.resposta, 'ia');
                fotoData = null;
            } catch (e) {
                appendMessage("Erro na ligação ao servidor.", 'ia', false);
            }
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('morais_user', payload.name);
            entrarNoSistema(payload.name);
            carregarListaSessoes();
            novoChat();
        }

        function fazerLogout() { localStorage.clear(); location.reload(); }

        function abrirSessao(id) {
            currentSessionId = id;
            const sessions = JSON.parse(localStorage.getItem('morais_sessions')) || [];
            const session = sessions.find(s => s.id === id);
            document.getElementById('chat-container').innerHTML = '';
            if (session) session.messages.forEach(m => appendMessage(m.text, m.type, false));
            carregarListaSessoes();
        }

        function previewImg() {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onload = (e) => { 
                fotoData = e.target.result;
                appendMessage("<i>[Imagem carregada]</i>", 'user'); 
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
