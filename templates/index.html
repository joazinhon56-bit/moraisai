<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morais AI - O Teu Assistente Inteligente</title>
    <style>
        /* CSS Básico para o Chat */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background-color: #007bff; color: white; border-bottom-right-radius: 2px; }
        .ia { align-self: flex-start; background-color: #333; color: #e0e0e0; border-bottom-left-radius: 2px; border: 1px solid #444; }
        #input-area { padding: 20px; background-color: #252525; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: none; background-color: #333; color: white; outline: none; }
        button { padding: 10px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-send { background-color: #007bff; color: white; }
        .btn-new { background-color: #444; color: white; }
        .btn-img { background-color: #28a745; color: white; }
        img.chat-img { max-width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
        .loading { font-style: italic; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message ia">Olá! Sou o **Morais AI**. Como posso ajudar-te hoje? Podes pedir-me para escrever, analisar fotos ou até **gerar imagens** (ex: "Desenha um camelo")!</div>
    </div>

    <div id="input-area">
        <button class="btn-new" onclick="novoChat()">+ Novo Chat</button>
        <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="uploadImagem()">
        <button class="btn-img" onclick="document.getElementById('file-input').click()">📷 Foto</button>
        <input type="text" id="user-input" placeholder="Escreve aqui a tua mensagem..." onkeypress="handleKeyPress(event)">
        <button class="btn-send" onclick="enviarMensagem()">Enviar</button>
    </div>

    <script>
        let imagemBase64 = null;

        // --- FUNÇÃO QUE CORRIGE O BUG DO LOGOUT ---
        function novoChat() {
            // 1. Limpa apenas as mensagens visualmente
            document.getElementById('chat-container').innerHTML = `
                <div class="message ia">Conversa reiniciada. Como posso ajudar agora?</div>
            `;
            
            // 2. Limpa APENAS o histórico do chat da memória do browser
            // Substitui 'historico_chat' pelo nome que usas para guardar a conversa
            localStorage.removeItem('historico_chat'); 
            
            // NOTA: Nunca usamos localStorage.clear() aqui para não deslogar!
            console.log("Chat limpo, mas continuas logado! ✅");
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') enviarMensagem();
        }

        async function uploadImagem() {
            const file = document.getElementById('file-input').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                imagemBase64 = e.target.result;
                appendMessage('Enviaste uma imagem para análise.', 'user');
            };
            reader.readAsDataURL(file);
        }

        function appendMessage(text, type, id = '') {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            if (id) div.id = id;
            div.innerHTML = text; // Usamos innerHTML para renderizar tags <img> e negritos
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function enviarMensagem() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            
            if (!msg && !imagemBase64) return;

            // Mostra a mensagem do utilizador
            if (msg) appendMessage(msg, 'user');
            input.value = '';

            // Mostra indicador de carregamento
            const tempId = 'loading-' + Date.now();
            appendMessage('O Morais AI está a pensar...', 'ia loading', tempId);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg: msg, image: imagemBase64 })
                });

                const data = await response.json();
                
                // Remove o loading e mostra a resposta real
                document.getElementById(tempId).remove();
                appendMessage(data.resposta, 'ia');
                
                // Limpa a imagem após enviar
                imagemBase64 = null;
                document.getElementById('file-input').value = '';

            } catch (error) {
                document.getElementById(tempId).innerHTML = "Erro ao ligar ao servidor. Tenta novamente.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
