<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morais AI - Oficial</title>
    <style>
        /* Estilos da Interface Morais AI */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0f0f0f; 
            color: #ffffff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Balões de Mensagem */
        .message { 
            max-width: 85%; 
            padding: 14px 18px; 
            border-radius: 18px; 
            line-height: 1.6; 
            word-wrap: break-word;
            font-size: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .user { 
            align-self: flex-end; 
            background: linear-gradient(135deg, #007bff, #0056b3); 
            color: white; 
            border-bottom-right-radius: 4px; 
        }

        .ia { 
            align-self: flex-start; 
            background-color: #262626; 
            color: #efefef; 
            border-bottom-left-radius: 4px; 
            border: 1px solid #3d3d3d; 
        }

        /* Área de Input */
        #input-area { 
            padding: 20px; 
            background-color: #1a1a1a; 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            border-top: 1px solid #333; 
        }

        input[type="text"] { 
            flex: 1; 
            padding: 14px 20px; 
            border-radius: 30px; 
            border: 1px solid #444; 
            background-color: #2d2d2d; 
            color: white; 
            outline: none; 
            font-size: 15px;
        }

        input[type="text"]:focus { border-color: #007bff; }

        button { 
            padding: 12px 22px; 
            border-radius: 30px; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .btn-send { background-color: #007bff; color: white; }
        .btn-send:hover { background-color: #0069d9; transform: scale(1.05); }

        .btn-new { background-color: #3d3d3d; color: #bbb; }
        .btn-new:hover { background-color: #4d4d4d; color: white; }

        .btn-img { background-color: #28a745; color: white; }
        .btn-img:hover { background-color: #218838; }

        /* Estilo para Imagens no Chat */
        .chat-img-render { 
            max-width: 100%; 
            border-radius: 12px; 
            margin-top: 10px; 
            border: 1px solid #444;
            display: block;
        }

        .loading-text { font-style: italic; color: #888; font-size: 13px; }

        /* Custom Scrollbar */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message ia">
            Olá! Sou o **Morais AI**. 🚀<br><br>
            Podes conversar comigo, enviar fotos para eu analisar ou pedir para eu criar algo novo (ex: "Desenha um camelo no espaço"). Como posso ajudar?
        </div>
    </div>

    <div id="input-area">
        <button class="btn-new" onclick="novoChat()">+ Novo Chat</button>
        
        <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="processarFoto()">
        <button class="btn-img" onclick="document.getElementById('file-input').click()">📷 Foto</button>
        
        <input type="text" id="user-input" placeholder="Escreve uma mensagem..." onkeypress="if(event.key==='Enter') enviarMensagem()">
        
        <button class="btn-send" onclick="enviarMensagem()">Enviar</button>
    </div>

    <script>
        let fotoParaEnviar = null;

        // --- CORREÇÃO DO BUG DE LOGOUT ---
        function novoChat() {
            // Limpa apenas o visual das mensagens
            const container = document.getElementById('chat-container');
            container.innerHTML = `
                <div class="message ia">Conversa reiniciada. O que vamos fazer agora?</div>
            `;
            
            // Limpa o histórico da conversa da memória se existir, 
            // mas NÃO apaga o login (NUNCA usa localStorage.clear())
            localStorage.removeItem('morais_chat_history');
            
            console.log("Interface limpa. Sessão preservada.");
        }

        function processarFoto() {
            const file = document.getElementById('file-input').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                fotoParaEnviar = e.target.result;
                appendMessage("<i>[Foto selecionada para análise]</i>", 'user');
            };
            reader.readAsDataURL(file);
        }

        function appendMessage(htmlContent, type, id = '') {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            if (id) div.id = id;
            
            // Importante: innerHTML permite que as tags <img> funcionem!
            div.innerHTML = htmlContent;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function enviarMensagem() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            
            if (!msg && !fotoParaEnviar) return;

            if (msg) appendMessage(msg, 'user');
            input.value = '';

            const loadingId = 'loading-' + Date.now();
            appendMessage('Morais AI está a processar...', 'ia loading-text', loadingId);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg: msg, image: fotoParaEnviar })
                });

                const data = await response.json();
                
                // Remove o aviso de carregamento
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                // Mostra a resposta da IA (com suporte a imagem se houver)
                appendMessage(data.resposta, 'ia');
                
                // Limpa a foto após enviar
                fotoParaEnviar = null;
                document.getElementById('file-input').value = '';

            } catch (error) {
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.innerHTML = "Erro de ligação. Verifica a tua internet.";
                console.error("Erro no fetch:", error);
            }
        }
    </script>
</body>
</html>
