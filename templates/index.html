<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morais AI - Autenticação</title>
    <style>
        /* Estilos de Base */
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background-color: #0a0a0a; color: white; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Contentor de Login */
        #login-container { background-color: #161616; padding: 40px; border-radius: 20px; border: 1px solid #2d2d2d; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #main-container { display: none; flex-direction: column; width: 100%; height: 100vh; background-color: #0f0f0f; }

        h2 { margin-bottom: 10px; font-size: 24px; color: #fff; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }

        /* Inputs */
        input.auth-input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input.auth-input:focus { border-color: #007bff; }

        /* Botões */
        .btn-primary { width: 100%; background-color: #007bff; color: white; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        .btn-primary:hover { background-color: #0056b3; }

        /* Botão Google */
        .btn-google { width: 100%; background-color: white; color: #000; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }
        .btn-google img { width: 18px; }

        /* Links de Troca */
        .toggle-link { margin-top: 20px; font-size: 13px; color: #888; }
        .toggle-link span { color: #007bff; cursor: pointer; font-weight: bold; }

        /* Interface do Chat */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 14px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background-color: #007bff; border-bottom-right-radius: 2px; }
        .ia { align-self: flex-start; background-color: #222; border: 1px solid #333; border-bottom-left-radius: 2px; }

        #input-area { padding: 20px; background-color: #161616; display: flex; gap: 10px; border-top: 1px solid #2d2d2d; }
        #user-input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #222; color: white; outline: none; }
        
        .btn-nav { background: #333; color: white; padding: 8px 15px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; }
        .top-bar { padding: 10px 20px; background: #161616; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d2d2d; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2 id="auth-title">Entrar no Morais AI</h2>
        <p id="auth-subtitle">Bem-vindo de volta, explorador.</p>
        
        <input type="text" id="username" class="auth-input" placeholder="Nome de utilizador">
        <input type="password" id="password" class="auth-input" placeholder="Palavra-passe">
        
        <button class="btn-primary" id="btn-auth-action" onclick="processarAuth()">Entrar</button>

        <button class="btn-google" onclick="loginComGoogle()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google">
            Continuar com o Google
        </button>

        <div class="toggle-link" id="toggle-text">
            Não tens conta? <span onclick="alternarModo()">Criar conta agora</span>
        </div>
    </div>

    <div id="main-container">
        <div class="top-bar">
            <span id="display-user" style="font-weight: bold; color: #007bff;"></span>
            <div>
                <button class="btn-nav" onclick="novoChat()" style="margin-right: 10px;">+ Novo Chat</button>
                <button class="btn-nav" onclick="fazerLogout()" style="background: #c82333;">Sair</button>
            </div>
        </div>
        
        <div id="chat-container"></div>

        <div id="input-area">
            <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="previewImg()">
            <button onclick="document.getElementById('file-input').click()" style="background: none; border: none; cursor: pointer; font-size: 20px;">📷</button>
            <input type="text" id="user-input" placeholder="Escreve uma mensagem..." onkeypress="if(event.key==='Enter') enviarMensagem()">
            <button class="btn-primary" style="width: auto; margin-top: 0;" onclick="enviarMensagem()">Enviar</button>
        </div>
    </div>

    <script>
        let modoRegistro = false;
        let fotoData = null;

        window.onload = () => {
            const user = localStorage.getItem('morais_user');
            if (user) {
                entrarNoSistema(user);
            }
        };

        function alternarModo() {
            modoRegistro = !modoRegistro;
            document.getElementById('auth-title').innerText = modoRegistro ? "Criar Nova Conta" : "Entrar no Morais AI";
            document.getElementById('auth-subtitle').innerText = modoRegistro ? "Junta-te à revolução da IA." : "Bem-vindo de volta, explorador.";
            document.getElementById('btn-auth-action').innerText = modoRegistro ? "Registar" : "Entrar";
            document.getElementById('toggle-text').innerHTML = modoRegistro ? 
                'Já tens conta? <span onclick="alternarModo()">Fazer Login</span>' : 
                'Não tens conta? <span onclick="alternarModo()">Criar conta agora</span>';
        }

        function processarAuth() {
            const user = document.getElementById('username').value;
            if (user.trim().length < 3) return alert("Insere um nome válido!");
            
            // Simulação: Guarda o utilizador no localStorage
            localStorage.setItem('morais_user', user);
            entrarNoSistema(user);
        }

        function loginComGoogle() {
            // Simulação de login Google
            const userGoogle = "Explorador Google";
            localStorage.setItem('morais_user', userGoogle);
            entrarNoSistema(userGoogle);
            alert("Login com Google simulado com sucesso! (Em produção, ligaríamos à API da Google)");
        }

        function entrarNoSistema(nome) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
            document.getElementById('display-user').innerText = "@" + nome;
            carregarHistorico();
        }

        function fazerLogout() {
            localStorage.removeItem('morais_user');
            location.reload();
        }

        function carregarHistorico() {
            const hist = JSON.parse(localStorage.getItem('morais_hist')) || [];
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            if (hist.length === 0) {
                appendMessage("Olá! Sou o **Morais AI**. Como posso ajudar-te hoje?", 'ia', false);
            } else {
                hist.forEach(m => appendMessage(m.text, m.type, false));
            }
        }

        function appendMessage(text, type, save = true) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            if (save) {
                const hist = JSON.parse(localStorage.getItem('morais_hist')) || [];
                hist.push({ text, type });
                localStorage.setItem('morais_hist', JSON.stringify(hist));
            }
        }

        function novoChat() {
            localStorage.removeItem('morais_hist');
            carregarHistorico();
        }

        async function enviarMensagem() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg && !fotoData) return;

            if (msg) appendMessage(msg, 'user');
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg: msg, image: fotoData })
                });
                const data = await res.json();
                appendMessage(data.resposta, 'ia');
                fotoData = null;
            } catch (e) {
                appendMessage("Erro na ligação ao servidor.", 'ia');
            }
        }

        function previewImg() {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onload = (e) => { 
                fotoData = e.target.result; 
                appendMessage("<i>[Imagem carregada para análise]</i>", 'user'); 
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
